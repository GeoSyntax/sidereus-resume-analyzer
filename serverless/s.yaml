edition: 3.0.0
name: resume-analyzer
access: default

vars:
  region: cn-hangzhou
  functionName: resume-analyzer-api

resources:
  resumeApi:
    component: fc3
    props:
      region: ${vars.region}
      functionName: ${vars.functionName}
      runtime: custom.debian10
      code: ../dist/fc-backend
      handler: not-used
      timeout: 60
      memorySize: 512
      cpu: 0.35
      diskSize: 512
      instanceConcurrency: 5
      internetAccess: true
      environmentVariables:
        APP_ENV: production
        MAX_UPLOAD_MB: "8"
        CACHE_TTL_SECONDS: "86400"
        CORS_ORIGINS: "https://geosyntax.github.io,http://localhost:5173,http://127.0.0.1:5173"
        # base_url and model are not secrets, so they are safe to commit.
        OPENAI_BASE_URL: https://token-plan-sgp.xiaomimimo.com/v1
        OPENAI_MODEL: mimo-v2.5-pro
        # Vision-capable model for OCR of scanned PDFs (not a secret).
        OPENAI_VISION_MODEL: mimo-v2.5
        # OPENAI_API_KEY is a secret: injected from the local env at deploy time, never committed.
        OPENAI_API_KEY: ${env('OPENAI_API_KEY')}
        # REDIS_URL is a secret (contains the password): injected at deploy time, never committed.
        # Must use the rediss:// scheme so redis-py enables TLS (Upstash requires it);
        # a plain redis:// URL fails to connect and silently falls back to memory.
        REDIS_URL: ${env('REDIS_URL')}
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          description: HTTP trigger for REST API
          qualifier: LATEST
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - OPTIONS
