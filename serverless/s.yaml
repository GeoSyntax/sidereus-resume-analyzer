edition: 3.0.0
name: resume-analyzer
access: default

vars:
  region: cn-hangzhou
  functionName: resume-analyzer-api

resources:
  resumeApi:
    component: fc3
    props:
      region: ${vars.region}
      functionName: ${vars.functionName}
      runtime: custom.debian10
      code: ../dist/fc-backend
      handler: not-used
      timeout: 60
      memorySize: 512
      diskSize: 512
      environmentVariables:
        APP_ENV: production
        MAX_UPLOAD_MB: "8"
        CACHE_TTL_SECONDS: "86400"
        CORS_ORIGINS: "https://geosyntax.github.io,http://localhost:5173,http://127.0.0.1:5173"
        OPENAI_BASE_URL: https://api.openai.com/v1
        OPENAI_MODEL: gpt-4o-mini
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          description: HTTP trigger for REST API
          qualifier: LATEST
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - OPTIONS
